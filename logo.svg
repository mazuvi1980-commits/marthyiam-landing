<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Gradiente principal azul a cian (lazo infinito) -->
    <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F62FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C2FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loopGradSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F62FE;stop-opacity:0.55" />
      <stop offset="100%" style="stop-color:#00C2FF;stop-opacity:0.55" />
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!-- ÍCONO: Lazo infinito (flujo continuo de identidad) -->
  <!-- ══════════════════════════════════════════ -->
  <circle cx="62" cy="73" r="32" fill="none" stroke="url(#loopGrad)" stroke-width="14"/>
  <circle cx="102" cy="73" r="32" fill="none" stroke="url(#loopGradSoft)" stroke-width="14"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- TIPOGRAFÍA (versión oscura para fondo claro) -->
  <!-- ══════════════════════════════════════════ -->

  <!-- "Marthy" en azul marino oscuro -->
  <text x="148" y="85"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="46"
        font-weight="700"
        letter-spacing="-1"
        fill="#101A33">Marthy</text>

  <!-- Separador vertical acento -->
  <rect x="310" y="52" width="2.5" height="36" rx="1.5" fill="url(#loopGrad)"/>

  <!-- IAM -->
  <text x="320" y="85"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="46"
        font-weight="800"
        letter-spacing="2"
        fill="#0F62FE">IAM</text>

  <!-- Tagline -->
  <text x="149" y="108"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="3"
        fill="#5B6B8F">IDENTITY · ACCESS · SECURITY</text>

  <!-- Línea decorativa bajo tagline -->
  <rect x="149" y="115" width="280" height="1.5" rx="1" fill="url(#loopGrad)" opacity="0.4"/>
</svg>
